<main class="advanced-login">
    <section class="login-form-card" aria-labelledby="login-heading">

            <div>
                <h1 class="title">Live<span class="title-highlight">Support</span></h1>

            </div>
        </div>
        <h2 class="welcome-heading">Welcome Back!</h2>
        <p class="welcome-description">Sign in to manage live conversations, orders, and customer support.</p>
        <form action="/login" method="POST" class="login-form" autocomplete="on">
            <label class="field">
                <span class="label-text">Email Address</span>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </label>


            
            <label class="field">
                <span class="label-text">Password</span>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input id="password" type="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="pw-toggle" aria-label="Show password" title="Show password">👁️</button>
                </div>
            </label>

            <div class="options-row">
                <label class="remember"><input type="checkbox" name="remember"> Remember me</label>
                <a class="forgot" href="#">Forgot Password?</a>
            </div>

            <button class="submit" type="submit">Sign In</button>

            <div class="divider"><span>or</span></div>

            <div class="socials">
                <button type="button" class="social google" aria-label="Sign in with Google">
                    <span class="google-logo" aria-hidden="true">

                            <path d="M272 107.3c38.6-.6 75.6 13.6 103.7 39.2l77.6-77.6C401.2 24.1 340.1 0 272 0 166.5 0 71.2 57.4 27.3 154.9l93 31.6C141.7 154.9 201.4 107.3 272 107.3z" fill="#EA4335"/>
                        </svg>

                    <span>Sign in with Google</span>

<script>
    // Password toggle
    document.addEventListener('click', e => {
        if (e.target.matches('.pw-toggle')) {
            const inp = document.getElementById('password');
            if (inp.type === 'password') { inp.type = 'text'; e.target.textContent = '👁️'; e.target.setAttribute('aria-label', 'Hide password'); }
            else { inp.type = 'password'; e.target.textContent = '🙈'; e.target.setAttribute('aria-label', 'Show password'); }
        }
    });
    
    // Theme toggle
    const themeToggle = document.querySelector('.theme-toggle');
    if (themeToggle) {
        const reflect = () => {
            const current = document.documentElement.dataset.theme || 'Light';
            themeToggle.setAttribute('aria-pressed', current === 'Dark');
        };
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.dataset.theme === 'Dark';
            const next = isDark ? 'Light' : 'Dark';
            document.documentElement.dataset.theme = next;
            document.documentElement.classList.toggle('dark-theme', next === 'Dark');
            localStorage.setItem('theme', next);
            reflect();
        });
        themeToggle.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') themeToggle.click(); });
        reflect();
    }

    // Show server errors if present
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const errorBox = document.getElementById('errorBox');
        if (params.get('error') === 'invalid') {
            errorBox.textContent = 'Invalid credentials - please try again.';
            errorBox.classList.remove('hidden');
            errorBox.classList.add('show');
            setTimeout(()=> errorBox.classList.remove('show'), 6000);
        }
    });
</script>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
        // Google client ID is fetched from the server so you don't need to hardcode it in the HTML
        let GOOGLE_CLIENT_ID = null;
        async function fetchGoogleConfig(){
            try{
                const r = await fetch('/auth/config');
                if (r.ok){
                    const j = await r.json();
                    GOOGLE_CLIENT_ID = j.googleClientId || null;
                } else {
                    // show a helpful error message when server says client not configured
                    try{ const j = await r.json(); if (j && j.error === 'google_client_not_configured') showError('Google client not configured on server. Set GOOGLE_CLIENT_ID in .env and restart.'); } catch(e){}
                }
            } catch (e){
                console.warn('Failed to fetch /auth/config', e);
            }
            // attempt init after fetching config
            initGoogleClient();
        }

    // Init the code client for the Authorization Code flow with PKCE.
    // This returns an authorization code which your server must exchange for tokens.
    let googleCodeClient;
    function initGoogleClient(){
        if (!window.google || !GOOGLE_CLIENT_ID) return;
        try {
            googleCodeClient = google.accounts.oauth2.initCodeClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'openid email profile',
                ux_mode: 'popup',
                callback: (resp) => {
                    if (resp && resp.code) handleGoogleCode(resp.code);
                    else showError('Google sign-in failed');
                }
            });
        } catch (e){
            console.warn('Google client init error', e);
        }
    }

    function showError(msg){
        const errorBox = document.getElementById('errorBox');
        if (!errorBox) return;
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        errorBox.classList.add('show');
        setTimeout(()=> errorBox.classList.remove('show'), 6000);
    }

    async function handleGoogleCode(code){
        try{
            const res = await fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            if (!res.ok) throw new Error('Server rejected Google login');
            const data = await res.json();
            // On success, server should reply with session info / redirect URL
            if (data && data.redirect) window.location = data.redirect;
            else window.location = '/';
        } catch (err){
            showError(err.message || 'Google sign-in error');
            console.error(err);
        }
    }

    // Attach click handler to Google button
    document.addEventListener('click', (e) => {
        if (e.target.closest('.social.google')){
            // ensure client initialized
            if (!googleCodeClient) initGoogleClient();
            if (!googleCodeClient){ showError('Google client not configured'); return; }
            googleCodeClient.requestCode();
        }
    });

    // Initialize once script loads (fetch client id then init)
    window.addEventListener('load', () => setTimeout(fetchGoogleConfig, 300));
</script>
